<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序演算法</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        a.card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 220px;
            height: 160px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        a.card:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 30px rgba(146, 254, 157, 0.3);
            background: rgba(255, 255, 255, 0.14);
        }

        a.card .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        a.card .label {
            font-size: 1.2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>📚 排序演算法動畫演示</h1>
    <div class="links">
        <a class="card" href="bubble_sort.html">
            <span class="icon">🫧</span>
            <span class="label">氣泡排序法</span>
        </a>
        <a class="card" href="selection_sort.html">
            <span class="icon">🎯</span>
            <span class="label">選擇排序法</span>
        </a>
        <a class="card" href="insertion_sort.html">
            <span class="icon">🔍</span>
            <span class="label">插入排序法</span>
        </a>
    </div>
</body>
</html>
